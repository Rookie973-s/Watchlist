<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RTSTUDIOS Watchlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0MSC72FNTK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0MSC72FNTK');
  </script>

  <style>
    :root {
      --bg-void:       #07070c;
      --bg-deep:       #0d0d16;
      --bg-card:       #13131e;
      --bg-raised:     #1a1a28;
      --bg-hover:      #22223a;
      --gold:          #c9a84c;
      --gold-bright:   #e8c96a;
      --gold-dim:      rgba(201,168,76,.15);
      --red:           #d94f3d;
      --red-glow:      rgba(217,79,61,.18);
      --teal:          #2dd4bf;
      --text-primary:  #f0ede6;
      --text-secondary:#9d9dba;
      --text-muted:    #585872;
      --border:        rgba(255,255,255,.06);
      --border-gold:   rgba(201,168,76,.3);
      --radius-sm:     8px;
      --radius-md:     14px;
      --radius-lg:     20px;
      --radius-xl:     28px;
      --font-display:  'Playfair Display', serif;
      --font-body:     'Outfit', sans-serif;
      --shadow-card:   0 8px 32px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.04) inset;
      --shadow-gold:   0 0 40px rgba(201,168,76,.12);
      --transition:    all .25s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .45;
    }

    /* ─── AMBIENT GLOW BLOBS ─── */
    .ambient {
      position: fixed; border-radius: 50%; filter: blur(90px);
      pointer-events: none; z-index: 0; animation: drift 18s ease-in-out infinite alternate;
    }
    .ambient-1 { width: 500px; height: 500px; background: rgba(201,168,76,.04); top: -100px; right: -120px; }
    .ambient-2 { width: 400px; height: 400px; background: rgba(217,79,61,.04); bottom: 5%; left: -80px; animation-delay: -7s; }
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,20px) scale(1.07)} }

    /* ─── FLOATING WATERMARKS ─── */
    .floating-text {
      position: fixed; z-index: 0; font-size: 28px;
      font-family: var(--font-display); color: rgba(255,255,255,.025);
      animation: moveRT 30s linear infinite; pointer-events: none;
      font-weight: 900; letter-spacing: .1em;
    }
    @keyframes moveRT { 0%{transform:translateY(-100vh) rotate(0)} 100%{transform:translateY(100vh) rotate(360deg)} }

    /* ─── WRAPPER ─── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 0 24px 120px;
    }

    /* ─── HEADER ─── */
    .header {
      text-align: center;
      padding: 56px 0 40px;
    }
    .header-eyebrow {
      display: inline-block;
      font-size: 11px; font-weight: 600; letter-spacing: .2em;
      text-transform: uppercase; color: var(--gold);
      border: 1px solid var(--border-gold);
      padding: 5px 14px; border-radius: 999px;
      margin-bottom: 20px;
      background: var(--gold-dim);
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 900; line-height: 1.1;
      color: var(--text-primary);
      letter-spacing: -.02em;
    }
    .header h1 span {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-sub {
      margin-top: 12px; font-size: 15px;
      color: var(--text-secondary); font-weight: 300;
      letter-spacing: .02em;
    }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px; width: 100%;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
      margin: 32px 0;
    }

    /* ─── LOGIN CARD ─── */
    #loginSection {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
      box-shadow: var(--shadow-card);
      transition: var(--transition);
    }
    #loginSection:hover { box-shadow: var(--shadow-card), var(--shadow-gold); }

    .section-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .18em;
      color: var(--text-muted); margin-bottom: 18px;
    }

    .input-row {
      display: flex; gap: 12px; align-items: stretch;
    }
    .input-wrap {
      flex: 1; position: relative;
    }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
      transition: var(--transition);
    }

    input[type="text"] {
      width: 100%; padding: 13px 14px 13px 42px;
      font-family: var(--font-body); font-size: 14px; font-weight: 400;
      background: var(--bg-raised); color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      outline: none; transition: var(--transition);
    }
    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus {
      border-color: var(--gold);
      background: var(--bg-hover);
      box-shadow: 0 0 0 3px rgba(201,168,76,.12);
    }
    input[type="text"]:focus + svg,
    .input-wrap:focus-within svg { color: var(--gold); }

    button {
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      letter-spacing: .04em; cursor: pointer;
      border: none; border-radius: var(--radius-md);
      padding: 13px 22px; transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      color: #0d0d0d;
    }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-danger {
      background: transparent; color: var(--text-muted);
      border: 1px solid transparent;
      padding: 7px 14px; font-size: 12px;
    }
    .btn-danger:hover { background: rgba(217,79,61,.15); color: var(--red); border-color: rgba(217,79,61,.3); }

    .btn-telegram {
      width: 100%; margin-top: 16px;
      background: linear-gradient(135deg, #229ED9, #1a88bf);
      color: #fff; padding: 14px;
      font-size: 14px; letter-spacing: .05em;
      border-radius: var(--radius-md);
    }
    .btn-telegram:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,158,217,.3); }

    /* ─── WELCOME PILL ─── */
    #welcomeText {
      font-size: 13px; color: var(--text-secondary);
      margin-top: 14px; display: none;
      align-items: center; gap: 10px;
    }
    #welcomeText.visible { display: flex; }
    .welcome-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
      box-shadow: 0 0 8px var(--teal);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── ADD SECTION ─── */
    #addSection {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 36px;
      box-shadow: var(--shadow-card);
      margin-bottom: 28px;
    }

    /* ─── AUTOCOMPLETE ─── */
    #autocomplete {
      position: absolute; top: calc(100% + 8px); left: 0;
      width: 100%; max-height: 300px; overflow-y: auto;
      background: var(--bg-raised);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-md);
      box-shadow: 0 16px 48px rgba(0,0,0,.65);
      z-index: 10000; display: none;
    }
    #autocomplete::-webkit-scrollbar { width: 4px; }
    #autocomplete::-webkit-scrollbar-track { background: transparent; }
    #autocomplete::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

    .ac-item {
      display: flex; align-items: center;
      padding: 10px 14px; cursor: pointer; gap: 14px;
      transition: var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: var(--bg-hover); }
    .ac-item img {
      width: 44px; height: 66px; object-fit: cover;
      border-radius: var(--radius-sm); flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
    .ac-item-info { flex: 1; }
    .ac-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .ac-item-year { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 20px;
    }
    .stat-pill {
      font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
    }
    .stat-pill strong { color: var(--gold-bright); font-weight: 700; }
    .progress-track {
      flex: 1; height: 3px;
      background: var(--bg-raised); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-bright));
      border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ─── SERIES LIST ─── */
    #seriesList { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }

    li {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-card);
      transition: var(--transition);
      animation: slideIn .3s cubic-bezier(.4,0,.2,1) both;
    }
    li:hover {
      border-color: rgba(201,168,76,.2);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card), 0 8px 24px rgba(0,0,0,.3);
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    li .poster-thumb {
      width: 56px; height: 84px; object-fit: cover;
      border-radius: 8px; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }

    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 15px; font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: var(--transition);
    }
    .item-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; margin-top: 5px;
      color: var(--text-muted);
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted); transition: var(--transition);
    }

    /* ─── CUSTOM CHECKBOX ─── */
    .check-wrap {
      position: relative; width: 22px; height: 22px;
      flex-shrink: 0;
    }
    .check-wrap input[type="checkbox"] {
      position: absolute; opacity: 0; width: 100%; height: 100%;
      cursor: pointer; z-index: 2; margin: 0; padding: 0;
      top: 0; left: 0;
    }
    .check-box {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--text-muted);
      background: transparent; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .check-box svg { opacity: 0; transition: var(--transition); }
    .check-wrap input:checked ~ .check-box {
      background: linear-gradient(135deg, var(--gold-bright), var(--gold));
      border-color: var(--gold);
    }
    .check-wrap input:checked ~ .check-box svg { opacity: 1; }

    /* Watched state */
    li.watched .item-title {
      text-decoration: line-through; color: var(--text-muted);
    }
    li.watched .badge-dot { background: var(--teal); }
    li.watched .item-badge { color: var(--teal); }
    li.watched .item-badge::after { content: 'Watched'; }
    li:not(.watched) .item-badge::after { content: 'Unwatched'; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      border: 2px dashed var(--text-muted);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      opacity: .4;
    }
    .empty-state p { font-size: 15px; }
    .empty-state span { font-size: 13px; color: var(--text-muted); opacity: .7; display: block; margin-top: 6px; }

    /* ─── BANNER ─── */
    .rt-banner {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      background: rgba(10,10,16,.92);
      border-radius: 999px;
      border: 1px solid var(--border-gold);
      box-shadow: 0 8px 32px rgba(0,0,0,.5), var(--shadow-gold);
      color: #fff; font-family: var(--font-body);
      text-align: center; z-index: 9999;
      animation: lightning-in 4s ease-out, show-then-hide 10s ease forwards;
      pointer-events: none; backdrop-filter: blur(12px);
    }
    .rt-glow {
      font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 10px;
    }
    .rt-glow strong {
      font-family: var(--font-display);
      font-size: 17px; font-weight: 700;
      color: var(--gold-bright);
      text-shadow: 0 0 12px rgba(232,201,106,.5);
    }
    @keyframes lightning-in {
      0%{opacity:0;transform:translateX(-50%) scale(.9)}
      20%{opacity:1;transform:translateX(-50%) scale(1);filter:brightness(1.5)}
      100%{filter:brightness(1)}
    }
    @keyframes show-then-hide { 0%,80%{opacity:1} 100%{opacity:0;visibility:hidden} }

    /* ─── LIST SECTION HEADER ─── */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .list-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 700;
      color: var(--text-primary);
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── LOCKED STATE ─── */
    #addSection.locked { opacity: .5; pointer-events: none; }

    /* ─── RESPONSIVE ─── */
    @media(max-width:520px){
      .wrapper{padding:0 16px 120px}
      #loginSection,#addSection{padding:24px 20px}
      .header{padding:36px 0 28px}
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <!-- Floating watermarks -->
  <div class="floating-text" style="top:10%;left:10%">ROTWAVE</div>
  <div class="floating-text" style="top:30%;left:70%">ROTWAVE</div>
  <div class="floating-text" style="top:60%;left:40%">ROTWAVE</div>
  <div class="floating-text" style="top:80%;left:20%">ROTWAVE</div>

  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <div class="header-eyebrow">RTSTUDIOS</div>
      <h1>Your <span>Watchlist</span></h1>
      <p class="header-sub">Track every series. Never lose your place.</p>
    </div>

    <!-- Login Card -->
    <div id="loginSection">
      <div class="section-label">Sign In or Register</div>
      <div class="input-row">
        <div class="input-wrap">
          <input type="text" id="usernameInput" placeholder="Your username..." autocomplete="off">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <button class="btn-primary" onclick="loginUser()">Enter</button>
      </div>
      <div id="welcomeText">
        <span class="welcome-dot"></span>
        <span id="welcomeInner"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Add Section -->
    <div id="addSection" class="locked">
      <div class="section-label">Add to Watchlist</div>
      <div style="position:relative">
        <div class="input-row">
          <div class="input-wrap" style="flex:1">
            <input type="text" id="seriesInput" placeholder="Search for a series or movie..." disabled autocomplete="off">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <button class="btn-primary" onclick="addSeries()">Add</button>
        </div>
        <div id="autocomplete"></div>
      </div>
    </div>

    <!-- List Section -->
    <div id="listSection" style="display:none">
      <div class="list-header">
        <span class="list-title">My Watchlist</span>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-pill"><strong id="statWatched">0</strong> watched</div>
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="stat-pill"><strong id="statTotal">0</strong> total</div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg>
        </div>
        <p>Nothing added yet</p>
        <span>Search for a title above to get started</span>
      </div>

      <ul id="seriesList"></ul>

      <!-- Telegram CTA -->
      <a href="https://t.me/rtmoviesera" target="_blank" style="text-decoration:none">
        <button class="btn-telegram">Join the ROTWAVE Telegram Channel</button>
      </a>
    </div>

  </div>

  <!-- Banner -->
  <div class="rt-banner">
    <div class="rt-glow">
      <span>Sponsored by</span>
      <strong>ROTWAVE</strong>
    </div>
  </div>

  <script>
    const TMDB_KEY = "276ce1441c92d4989b5a0080e47e0633";
    const IMG_BASE  = "https://image.tmdb.org/t/p/w92";
    const API_BASE  = "https://rtwatch-backend.onrender.com";

    let currentUser = null;
    let authToken   = null;

    const seriesList = document.getElementById("seriesList");
    const inputBox   = document.getElementById("seriesInput");
    const acBox      = document.getElementById("autocomplete");

    /* ─── STATS ─── */
    function updateStats() {
      const items   = seriesList.querySelectorAll("li");
      const total   = items.length;
      const watched = [...items].filter(li => li.classList.contains("watched")).length;
      document.getElementById("statWatched").textContent = watched;
      document.getElementById("statTotal").textContent   = total;
      const pct = total ? (watched / total * 100).toFixed(0) : 0;
      document.getElementById("progressFill").style.width = pct + "%";
      const empty = document.getElementById("emptyState");
      empty.classList.toggle("visible", total === 0);
    }

    /* ─── ACCOUNT ─── */
    async function loginUser() {
      const username = document.getElementById("usernameInput").value.trim();
      if (!username) return;
      const password = prompt(`Welcome ${username}! Enter your password (a new account will be created if needed):`);
      if (!password) return;

      try {
        const res  = await fetch(`${API_BASE}/api/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error || "Login failed");

        authToken   = data.token;
        currentUser = data.username;

        const wt = document.getElementById("welcomeText");
        document.getElementById("welcomeInner").textContent = `Signed in as ${username} — your list syncs automatically.`;
        wt.classList.add("visible");

        document.getElementById("addSection").classList.remove("locked");
        inputBox.disabled = false;
        document.getElementById("listSection").style.display = "block";
        await loadList();
      } catch(e) { console.error(e); alert("Server error"); }
    }

    /* ─── AUTOCOMPLETE ─── */
    let debounceTimer;
    inputBox.addEventListener("input", () => {
      const q = inputBox.value.trim();
      clearTimeout(debounceTimer);
      if (!q) return acBox.style.display = "none";
      debounceTimer = setTimeout(() => fetchSuggestions(q), 350);
    });

    async function fetchSuggestions(query) {
      const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=en-US&page=1&include_adult=false&query=${encodeURIComponent(query)}`;
      try {
        const res  = await fetch(url);
        const data = await res.json();
        acBox.innerHTML = "";
        data.results.slice(0, 7).forEach(item => {
          if (!item.poster_path) return;
          const year = (item.release_date || item.first_air_date || "").slice(0, 4);
          const div  = document.createElement("div");
          div.className = "ac-item";
          div.innerHTML = `
            <img src="${IMG_BASE}${item.poster_path}" alt="">
            <div class="ac-item-info">
              <div class="ac-item-title">${item.title || item.name}</div>
              ${year ? `<div class="ac-item-year">${year}</div>` : ""}
            </div>`;
          div.addEventListener("click", () => {
            inputBox.value = item.title || item.name;
            inputBox.dataset.poster = IMG_BASE + item.poster_path;
            acBox.style.display = "none";
          });
          acBox.appendChild(div);
        });
        acBox.style.display = acBox.childElementCount ? "block" : "none";
      } catch(e) { console.error(e); }
    }

    document.addEventListener("click", e => {
      if (!acBox.contains(e.target) && e.target !== inputBox) acBox.style.display = "none";
    });

    /* ─── BUILD LI ─── */
    function buildItem(name, watched, poster) {
      const li        = document.createElement("li");
      const checkWrap = document.createElement("div");
      const checkbox  = document.createElement("input");
      const checkBox  = document.createElement("div");
      const checkSvg  = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const itemBody  = document.createElement("div");
      const titleEl   = document.createElement("div");
      const badgeEl   = document.createElement("div");
      const deleteBtn = document.createElement("button");

      /* Poster */
      if (poster) {
        const img = document.createElement("img");
        img.src = poster;
        img.className = "poster-thumb";
        li.appendChild(img);
      }

      /* Checkbox */
      checkbox.type = "checkbox";
      checkbox.checked = watched;
      checkSvg.setAttribute("xmlns","http://www.w3.org/2000/svg");
      checkSvg.setAttribute("width","12"); checkSvg.setAttribute("height","12");
      checkSvg.setAttribute("viewBox","0 0 24 24");
      checkSvg.setAttribute("fill","none");
      checkSvg.setAttribute("stroke","#0d0d0d");
      checkSvg.setAttribute("stroke-width","3");
      checkSvg.setAttribute("stroke-linecap","round");
      checkSvg.setAttribute("stroke-linejoin","round");
      checkSvg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      checkBox.className = "check-box";
      checkBox.appendChild(checkSvg);
      checkWrap.className = "check-wrap";
      checkWrap.appendChild(checkbox);
      checkWrap.appendChild(checkBox);

      /* Text */
      titleEl.className = "item-title";
      titleEl.textContent = name;
      badgeEl.className = "item-badge";
      const dot = document.createElement("span");
      dot.className = "badge-dot";
      badgeEl.appendChild(dot);
      itemBody.className = "item-body";
      itemBody.appendChild(titleEl);
      itemBody.appendChild(badgeEl);

      /* Delete */
      deleteBtn.textContent = "Remove";
      deleteBtn.className = "btn-danger";
      deleteBtn.addEventListener("click", () => {
        li.style.opacity = "0";
        li.style.transform = "translateX(20px)";
        setTimeout(() => { li.remove(); saveList(); updateStats(); }, 250);
      });

      /* State */
      if (watched) li.classList.add("watched");

      checkbox.addEventListener("change", () => {
        li.classList.toggle("watched", checkbox.checked);
        saveList(); updateStats();
      });

      li.append(checkWrap, itemBody, deleteBtn);
      return li;
    }

    /* ─── ADD SERIES ─── */
    async function addSeries() {
      const name = inputBox.value.trim();
      if (!name) return;
      const poster = inputBox.dataset.poster || "";
      const li = buildItem(name, false, poster);
      seriesList.appendChild(li);
      inputBox.value = "";
      delete inputBox.dataset.poster;
      acBox.style.display = "none";
      updateStats();
      await saveList();
    }

    /* ─── STORAGE ─── */
    async function saveList() {
      if (!currentUser || !authToken) return;
      const data = [...seriesList.querySelectorAll("li")].map(li => ({
        name:    li.querySelector(".item-title").textContent.trim(),
        watched: li.querySelector("input[type='checkbox']").checked,
        poster:  (li.querySelector(".poster-thumb") || {}).src || ""
      }));
      try {
        await fetch(`${API_BASE}/api/watchlist`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${authToken}` },
          body: JSON.stringify({ watchlist: data })
        });
      } catch(e) { console.error(e); }
    }

    async function loadList() {
      seriesList.innerHTML = "";
      if (!currentUser || !authToken) return;
      try {
        const res  = await fetch(`${API_BASE}/api/watchlist`, {
          headers: { "Authorization": `Bearer ${authToken}` }
        });
        const data = await res.json();
        (data.watchlist || []).forEach(item => {
          const li = buildItem(item.name, item.watched, item.poster);
          seriesList.appendChild(li);
        });
        updateStats();
      } catch(e) { console.error(e); }
    }
  </script>
</body>
</html>
